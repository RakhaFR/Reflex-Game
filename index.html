<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReflexRythm - Main Menu</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/home-new.css" />
  <!-- FONT AWESOME CDN UNTUK IKON SOSIAL RESMI -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="assets/picture/logo.png">
</head>

<body class="main-menu-page">

  <!-- BACKGROUND LIVE2D VIDEO FOR MAIN MENU -->
  <div class="menu-video-bg">
    <video autoplay loop muted playsinline>
      <source src="assets/video/lobby.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>

  <!-- MAIN INTERFACE LAYOUT -->
  <main class="menu-layout">

    <!-- BRANDING TITLE (CENTER BIG BANG STYLE) -->
    <header class="menu-header">
      <div class="brand-box">
        <h1 class="game-title-main">REFLEX<span class="accent">RYTHM</span></h1>
        <p class="game-tagline">// THE ULTIMATE REFLEX & RHYTHM CHALLENGE</p>
      </div>
    </header>

    <!-- CENTER NAVIGATION MENU -->
    <div class="menu-content-center">
      <div class="buttons-vertical-stack">

        <!-- PLAY BUTTON (DELAYED FOR SFX) -->
        <a href="lobby.html" class="menu-btn btn-play" id="btnMainPlay">
          <div class="btn-skew-inner">
            <span class="btn-icon"><i class="fas fa-play"></i></span>
            <span class="btn-text">START PLAY</span>
          </div>
        </a>

        <!-- OTHER GAMES BUTTON -->
        <button class="menu-btn btn-utility btn-orange" id="btnMainOtherGames">
          <div class="btn-skew-inner">
            <span class="btn-icon"><i class="fas fa-gamepad"></i></span>
            <span class="btn-text">OTHER GAMES</span>
          </div>
        </button>

        <!-- DONATE BUTTON (DELAYED FOR SFX) -->
        <a href="https://lynk.id/bangriyadi/s/z6l332ojeqrg" class="menu-btn btn-utility btn-pink" id="btnMainDonate">
          <div class="btn-skew-inner">
            <span class="btn-icon"><i class="fas fa-heart"></i></span>
            <span class="btn-text">DONATE SUPPORT</span>
          </div>
        </a>

      </div>
    </div>

    <!-- FOOTER ZONE: CENTERED & HIGH INTERACTIVE -->
    <footer class="menu-footer">
      <div class="footer-center-container">
        <div class="social-panel">
          <span class="social-label">CONNECT WITH US //</span>
          <div class="social-icons-row">

            <!-- INSTAGRAM -->
            <a href="https://instagram.com" class="social-circle-link ig" title="Instagram">
              <span class="social-txt-icon"><i class="fab fa-instagram"></i></span>
            </a>

            <!-- DISCORD -->
            <a href="https://discord.com" class="social-circle-link dc" title="Discord">
              <span class="social-txt-icon"><i class="fab fa-discord"></i></span>
            </a>

            <!-- GITHUB -->
            <a href="https://github.com" class="social-circle-link gh" title="GitHub">
              <span class="social-txt-icon"><i class="fab fa-github"></i></span>
            </a>

            <!-- TIKTOK -->
            <a href="https://tiktok.com" class="social-circle-link tk" title="TikTok">
              <span class="social-txt-icon"><i class="fab fa-tiktok"></i></span>
            </a>

          </div>
        </div>
        <div class="copyright-tag">
          <span>© 2026 REFLEXRYTHM PROJECT // ALL RIGHTS RESERVED</span>
        </div>
      </div>
    </footer>

  </main>

  <!-- MODAL POP-UP FOR OTHER GAMES -->
  <div id="modalOtherGames" class="popup-overlay-menu">
    <div class="popup-box-skew">
      <div class="popup-header-row">
        <h3 class="popup-box-title">[G] OTHER GAMES PROJECT</h3>
        <button class="popup-close-btn" id="btnCloseModal">✕</button>
      </div>
      <div class="popup-body-content">
        <p class="coming-soon-text">COMING SOON // PROYEK GAME BARU SEDANG DIKEMBANGKAN</p>
        <div class="game-preview-placeholder">
          <div class="preview-card-item">
            <span class="card-status">IN PRODUCTION</span>
            <span class="card-name">Hands Speed Runner</span>
          </div>
          <div class="preview-card-item">
            <span class="card-status">PLANNING</span>
            <span class="card-name">Rythm Arena Arena 1v1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SFX AUDIO -->
  <audio id="clickSound" src="assets/audio/click.mp3"></audio>
  <audio id="countdownSound" src="assets/audio/countdown.mp3"></audio>

  <script src="js/utils.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/basic-mode.js"></script>
  <script src="js/time-attack.js"></script>
  <script src="js/versus-mode.js"></script>
  <script src="js/popups.js"></script>

  <script src="js/main.js"></script>


</body>

</html>
