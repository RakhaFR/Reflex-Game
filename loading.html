<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReflexRythm Preview Loading</title>
</head>
<style>
/* ==========================================================================
   REFLEXRYTHM OFFICIAL STYLIZED LOADING SCREEN
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Impact&family=Montserrat:wght@800;900&display=swap');

.rr-loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #0d0d11; /* Hitam pekat solid cocok dengan background menu */
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden;
  transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
}

.rr-loading-wrapper {
  position: relative;
  width: 85%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Banner kecil kuning di atas */
.rr-top-banner {
  background: #ffaa00; /* Warna kuning tombol Other Games */
  color: #000;
  font-size: 11px;
  font-weight: 900;
  padding: 5px 14px;
  align-self: flex-start;
  transform: skewX(-10deg);
  border: 3px solid #000;
  box-shadow: 4px 4px 0px #000;
}

/* Panel Judul Utama (Magenta/Pink Kuat) */
.rr-title-block {
  background: #ff1166; /* Warna pink/magenta tombol Start Play */
  padding: 20px 30px;
  border: 4px solid #000;
  box-shadow: 6px 6px 0px #000;
  transform: skewX(-10deg);
  position: relative;
}

.rr-main-title {
  font-family: 'Impact', 'Montserrat', sans-serif;
  font-size: 3.2rem;
  color: #fff;
  margin: 0;
  line-height: 1;
  letter-spacing: 2px;
  text-transform: uppercase;
  -webkit-text-stroke: 1.5px #000;
  transform: skewX(2deg);
}

.rr-sub-badge {
  position: absolute;
  bottom: -14px;
  right: 20px;
  background: #fff;
  color: #000;
  border: 3px solid #000;
  padding: 2px 12px;
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 1px;
}

/* Teks Status Loading */
.rr-progress-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.rr-status-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  color: #fff;
  font-weight: 900;
  font-size: 13px;
}

.rr-status-text {
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8a8996;
}

.rr-pct {
  font-size: 2rem;
  font-family: 'Impact', sans-serif;
  color: #ffaa00;
  -webkit-text-stroke: 1px #000;
}

/* Wadah Loading Bar Tebal */
.rr-bar-container {
  height: 26px;
  background: #201f26;
  border: 4px solid #000;
  box-shadow: 4px 4px 0px #000;
  transform: skewX(-10deg);
  overflow: hidden;
  padding: 2px;
}

/* Isi progress bar: transisi warna dari Putih -> Merah/Pink */
.rr-bar-fill {
  height: 100%;
  background: #fff;
  border-right: 3px solid #000;
  transition: width 0.05s linear;
}

/* Dekorasi Footer Box */
.rr-footer-block {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 5px;
}

.rr-meta-box {
  background: #000;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 14px;
  transform: skewX(-10deg);
  border: 3px solid #000;
}

.rr-tag {
  color: #fff;
  font-size: 11px;
  font-weight: 900;
}

.rr-beats-dot {
  display: flex;
  gap: 5px;
}

.rr-beats-dot .dot {
  width: 8px;
  height: 8px;
  background: #3c3b47;
  border: 1px solid #000;
}

.rr-beats-dot .dot.active {
  background: #ff5599;
}

.rr-sys-msg {
  color: #4a4957;
  font-weight: 900;
  font-size: 11px;
}

/* Fade Out State */
.loading-fade-out {
  opacity: 0;
  visibility: hidden;
}
</style>
<body>
<div id="loadingScreen" class="rr-loading-screen">
  <div class="rr-loading-wrapper">
    
    <div class="rr-top-banner">
      <span class="rr-ver-text">REFLEX ENGINE // v2.0.26</span>
    </div>

    <div class="rr-title-block">
      <h1 class="rr-main-title">LOADING DATA</h1>
      <div class="rr-sub-badge">BEAT SYNCHRONIZATION</div>
    </div>

    <div class="rr-progress-section">
      <div class="rr-status-row">
        <span id="loadingSubtitle" class="rr-status-text">INITIALIZING AUDIO BUFFER...</span>
        <span class="rr-pct">0%</span>
      </div>
      
      <div class="rr-bar-container">
        <div class="rr-bar-fill" style="width: 0%;"></div>
      </div>
    </div>

    <div class="rr-footer-block">
      <div class="rr-meta-box">
        <span class="rr-tag">TRACK ENGINE</span>
        <div class="rr-beats-dot">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="rr-sys-msg">STATUS: OK</div>
    </div>

  </div>
</div>
</body>
<script>
/* ==========================================================================
   A. CORE ENGINE: LOADING SCREEN TRACKER (PURE ANIMATION PREVIEW SIMULATOR)
   ========================================================================== */
function initLoadingScreen() {
  const screen = document.getElementById("loadingScreen");
  const barFill = document.querySelector(".rr-bar-fill");
  const pctEl = document.querySelector(".rr-pct");
  const subtitleEl = document.getElementById("loadingSubtitle");

  const rhythmLogs = [
    { pct: 15, msg: "LOADING REFLEX CORE DATA..." },
    { pct: 35, msg: "PARSING BEATMAP RECORDS..." },
    { pct: 60, msg: "SINKRONISASI AUDIO ENGINE..." },
    { pct: 75, msg: "MENGISI BUFFER SUARA SFX..." },
    { pct: 90, msg: "RENDERING INTERFACE GRAFFITI..." },
    { pct: 100, msg: "SINKRONISASI SELESAI!" }
  ];

  let currentPercent = 0;

  const progressInterval = setInterval(() => {
    currentPercent += Math.floor(Math.random() * 5) + 2;
    
    if (currentPercent >= 100) {
      currentPercent = 100;
      clearInterval(progressInterval);
      finishPreview();
    }

    const matchingLog = rhythmLogs.find(log => currentPercent <= log.pct);
    if (subtitleEl && matchingLog) {
      subtitleEl.textContent = matchingLog.msg;
    }

    if (barFill) {
      barFill.style.width = currentPercent + "%";
      if (currentPercent > 65) {
        barFill.style.background = "#ff1166"; 
      } else {
        barFill.style.background = "#fff"; 
      }
    }

    if (pctEl) {
      pctEl.textContent = currentPercent + "%";
    }

    const dots = document.querySelectorAll(".rr-beats-dot .dot");
    if (dots.length > 0) {
      const activeDotIdx = Math.floor(currentPercent / 10) % dots.length;
      dots.forEach((d, idx) => d.classList.toggle("active", idx === activeDotIdx));
    }

  }, 50);

  function finishPreview() {
    if (subtitleEl) subtitleEl.textContent = "READY TO JAM! 🎵";
    if (barFill) barFill.style.background = "#ffaa00"; 
    
    document.querySelectorAll(".rr-beats-dot .dot").forEach(d => d.classList.add("active"));

    setTimeout(() => {
      if (screen) {
        screen.classList.add("loading-fade-out");
        setTimeout(() => {
          screen.style.display = "none";
        }, 400);
      }
    }, 600);
  }
}

// FIX: Panggil fungsi simulasi di sini begitu DOM siap jalankan!
document.addEventListener("DOMContentLoaded", () => {
    initLoadingScreen();
});
</script>
</html>
